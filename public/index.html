<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise — Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f8f7f4; --surface:#fff; --surface2:#f0eeea; --border:#e5e2dc;
      --text:#3a3530; --text2:#7d766e; --text3:#b5ada3;
      --accent:#b8734a; --accent-hover:#a0633d;
      --green:#5e9e6e; --red:#c05656; --blue:#5f8aaa; --purple:#8a78aa; --amber:#bfa044;
      --radius:10px;
    }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

    /* header */
    .header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .logo { font-size:1.15rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; }
    .nav { display:flex; gap:2px; }
    .nav-btn { padding:7px 16px; border:none; background:none; font-family:inherit; font-size:.82rem; font-weight:600; color:var(--text3); cursor:pointer; border-radius:8px; transition:all .15s; }
    .nav-btn:hover { color:var(--text2); background:var(--surface2); }
    .nav-btn.active { color:var(--text); background:var(--surface2); }
    .user-info { display:flex; align-items:center; gap:10px; font-size:.82rem; color:var(--text2); }
    .user-info button { border:none; background:none; cursor:pointer; color:var(--text2); font-size:1rem; }

    .container { max-width:1060px; margin:0 auto; padding:20px 20px 60px; }

    /* cards */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
    .stat-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.4px; color:var(--text3); font-weight:700; margin-bottom:2px; }
    .stat-value { font-family:'Source Code Pro',monospace; font-size:1.4rem; font-weight:500; }
    .stat-sub { font-size:.77rem; color:var(--text3); }

    /* toolbar */
    .toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
    .toolbar-left { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

    /* inputs */
    .input, .select { padding:8px 11px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:.85rem; color:var(--text); background:var(--surface); cursor:text; }
    select.input { cursor:pointer; }
    .input:focus, .select:focus { outline:none; border-color:var(--accent); }
    .input::placeholder { color:var(--text3); }
    .search-wrap { position:relative; }
    .search-wrap .input { padding-left:30px; width:200px; }
    .search-icon { position:absolute; left:9px; top:9px; color:var(--text3); font-size:.85rem; }
    textarea.input { resize:vertical; min-height:55px; width:100%; }

    /* buttons */
    .btn { padding:8px 16px; border:none; border-radius:8px; font-family:inherit; font-size:.84rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:background .15s; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-hover); }
    .btn-ghost { background:none; color:var(--text2); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--surface2); }
    .btn-danger { background:none; color:var(--red); border:1px solid #e8cbc8; }
    .btn-danger:hover { background:#faf0ef; }
    .btn-full { width:100%; justify-content:center; padding:11px 0; }

    /* table */
    .table { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .table-head { display:grid; gap:10px; padding:10px 18px; background:var(--surface2); font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--text3); }
    .table-row { display:grid; gap:10px; padding:12px 18px; align-items:center; border-top:1px solid var(--border); transition:background .12s; }
    .table-row:hover { background:#fcfbf9; }
    .cols-5 { grid-template-columns:2fr 1fr 1fr 1fr auto; }
    .cols-admin { grid-template-columns:2fr 2fr 1fr 1.2fr auto; }
    .cols-activity { grid-template-columns:1.5fr 1fr 2fr 1.5fr; }

    .exp-title { font-weight:600; font-size:.88rem; }
    .exp-desc { font-size:.76rem; color:var(--text2); margin-top:1px; }
    .badge { font-size:.72rem; font-weight:600; padding:3px 9px; border-radius:6px; background:var(--surface2); white-space:nowrap; }
    .mono { font-family:'Source Code Pro',monospace; }
    .muted { font-size:.82rem; color:var(--text2); }
    .muted-sm { font-size:.78rem; color:var(--text3); }
    .icon-btn { width:30px; height:30px; border:none; background:none; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:.9rem; transition:all .12s; }
    .icon-btn:hover { background:var(--surface2); color:var(--text2); }
    .icon-btn.del:hover { background:#faf0ef; color:var(--red); }
    .row-actions { display:flex; gap:2px; }
    .empty { text-align:center; padding:50px 20px; color:var(--text3); }

    /* modal */
    .overlay { position:fixed; inset:0; background:rgba(55,50,44,.25); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:100; animation:fadeIn .12s; }
    .modal { background:var(--surface); border-radius:14px; width:90%; max-width:460px; box-shadow:0 8px 30px rgba(0,0,0,.08); animation:slideUp .18s; }
    .modal-head { display:flex; justify-content:space-between; align-items:center; padding:18px 22px 0; }
    .modal-head h3 { font-size:1.05rem; font-weight:700; }
    .modal-body { padding:18px 22px; }
    .modal-foot { display:flex; justify-content:flex-end; gap:8px; padding:0 22px 18px; }
    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-size:.78rem; font-weight:600; color:var(--text2); margin-bottom:4px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .form-error { background:#faf0ef; border:1px solid #e8cbc8; color:var(--red); padding:9px 12px; border-radius:8px; font-size:.84rem; margin-bottom:14px; }
    .close-btn { width:30px; height:30px; border:none; background:var(--surface2); border-radius:8px; cursor:pointer; font-size:1rem; color:var(--text2); display:flex; align-items:center; justify-content:center; }

    /* confirm */
    .confirm-body { padding:24px; text-align:center; }
    .confirm-body p { color:var(--text2); margin-top:6px; font-size:.88rem; }
    .confirm-foot { display:flex; justify-content:center; gap:8px; padding:0 24px 22px; }

    /* auth page */
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
    .auth-box { width:100%; max-width:400px; padding:20px; }
    .auth-toggle { display:flex; gap:4px; margin-bottom:20px; background:var(--surface2); border-radius:8px; padding:3px; }
    .auth-toggle button { flex:1; padding:8px 0; border:none; border-radius:6px; font-family:inherit; font-size:.84rem; font-weight:600; cursor:pointer; transition:all .15s; }
    .auth-toggle .active { background:#fff; color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .auth-toggle button:not(.active) { background:none; color:var(--text3); }
    .input-icon { position:relative; }
    .input-icon .input { padding-left:32px; width:100%; }
    .input-icon .ico { position:absolute; left:10px; top:10px; color:var(--text3); font-size:.85rem; }
    .input-icon .toggle { position:absolute; right:8px; top:7px; border:none; background:none; cursor:pointer; color:var(--text3); font-size:.85rem; }

    /* dashboard */
    .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:4px; }
    .chart-card { padding:22px; }
    .chart-card h3 { font-size:.9rem; font-weight:700; margin-bottom:16px; }
    .cat-row { display:flex; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); }
    .cat-row:last-child { border-bottom:none; }
    .cat-name { font-size:.84rem; font-weight:500; min-width:100px; }
    .cat-bar-wrap { flex:1; margin:0 14px; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
    .cat-bar { height:100%; border-radius:3px; transition:width .35s ease; }
    .cat-amount { font-family:'Source Code Pro',monospace; font-size:.82rem; font-weight:500; white-space:nowrap; }
    .bar-chart { display:flex; align-items:flex-end; gap:10px; height:160px; }
    .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
    .bar { width:100%; max-width:44px; background:var(--accent); opacity:.75; border-radius:5px 5px 0 0; transition:height .35s ease; min-height:3px; }
    .bar-lbl { margin-top:6px; font-size:.68rem; color:var(--text3); font-weight:600; }
    .bar-val { font-family:'Source Code Pro',monospace; font-size:.68rem; color:var(--text2); margin-bottom:3px; }

    /* admin tabs */
    .tab-bar { display:flex; gap:4px; margin-bottom:18px; background:var(--surface); border-radius:8px; padding:3px; border:1px solid var(--border); width:fit-content; }
    .tab-btn { padding:7px 18px; border:none; border-radius:6px; font-family:inherit; font-size:.84rem; font-weight:600; cursor:pointer; transition:all .15s; }
    .tab-btn.active { background:var(--text); color:#fff; }
    .tab-btn:not(.active) { background:none; color:var(--text3); }

    /* toast */
    .toast { position:fixed; bottom:20px; right:20px; background:var(--text); color:#faf9f7; padding:10px 18px; border-radius:8px; font-size:.85rem; font-weight:500; z-index:200; animation:slideUp .2s; box-shadow:0 4px 16px rgba(0,0,0,.1); }

    .spinner { display:flex; justify-content:center; padding:50px; }
    .spinner::after { content:''; width:28px; height:28px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:768px) {
      .dash-grid{grid-template-columns:1fr} .cols-5,.cols-admin,.cols-activity{grid-template-columns:1fr}
      .table-head{display:none} .toolbar{flex-direction:column;align-items:stretch}
      .toolbar-left{flex-direction:column} .search-wrap .input{width:100%}
      .form-row{grid-template-columns:1fr} .stats-row{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const CATS = ["Food & Dining","Transport","Shopping","Entertainment","Bills & Utilities","Health","Education","Travel","Other"];
const CAT_CLR = {"Food & Dining":"#b8734a","Transport":"#5f8aaa","Shopping":"#8a78aa","Entertainment":"#bfa044","Bills & Utilities":"#7d766e","Health":"#5e9e6e","Education":"#4a9ea8","Travel":"#c07070","Other":"#b5ada3"};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt = n => "$"+Number(n).toFixed(2);
const fmtDate = d => new Date(d).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"});
const fmtTime = d => new Date(d).toLocaleString("en-AU",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
const todayStr = () => new Date().toISOString().split("T")[0];

/* ── API helper ──── */
function getToken() { return sessionStorage.getItem("token"); }

async function api(url, opts={}) {
  const headers = { "Content-Type":"application/json" };
  const token = getToken();
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(url, { headers, ...opts });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

/* ── Auth Page ──── */
function AuthPage({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ name:"", email:"", password:"" });
  const [show, setShow] = useState(false);
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const ch = e => { setForm({...form,[e.target.name]:e.target.value}); setErr(""); };

  async function submit() {
    setBusy(true); setErr("");
    try {
      if (mode === "login") {
        const data = await api("/api/auth/login", { method:"POST", body:JSON.stringify({ email:form.email, password:form.password }) });
        onLogin(data.token, data.user);
      } else {
        if (!form.name.trim()) { setErr("Enter your name."); setBusy(false); return; }
        const data = await api("/api/auth/register", { method:"POST", body:JSON.stringify(form) });
        onLogin(data.token, data.user);
      }
    } catch(e) { setErr(e.message); }
    finally { setBusy(false); }
  }

  return (
    <div className="auth-page">
      <div className="auth-box">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div className="logo" style={{justifyContent:"center",fontSize:"1.4rem",marginBottom:6}}><span className="logo-dot"></span> SpendWise</div>
          <p style={{color:"var(--text2)",fontSize:".9rem"}}>Track your spending, stay in control.</p>
        </div>
        <div className="card" style={{padding:24}}>
          <div className="auth-toggle">
            <button className={mode==="login"?"active":""} onClick={()=>{setMode("login");setErr("")}}>Sign in</button>
            <button className={mode==="register"?"active":""} onClick={()=>{setMode("register");setErr("")}}>Create account</button>
          </div>

          {err && <div className="form-error">{err}</div>}

          {mode==="register" && (
            <div className="form-group">
              <label className="form-label">Name</label>
              <div className="input-icon"><span className="ico">&#128100;</span><input className="input" name="name" value={form.name} onChange={ch} placeholder="Your name" /></div>
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Email</label>
            <div className="input-icon"><span className="ico">&#9993;</span><input className="input" name="email" value={form.email} onChange={ch} placeholder="you@email.com" /></div>
          </div>
          <div className="form-group" style={{marginBottom:20}}>
            <label className="form-label">Password</label>
            <div className="input-icon">
              <span className="ico">&#128274;</span>
              <input className="input" name="password" type={show?"text":"password"} value={form.password} onChange={ch} placeholder="••••••" />
              <button className="toggle" onClick={()=>setShow(!show)}>{show?"\u{1F440}":"\u{1F441}"}</button>
            </div>
          </div>
          <button className="btn btn-primary btn-full" onClick={submit} disabled={busy}>
            {busy ? "Please wait..." : mode==="login" ? "Sign in →" : "Create account →"}
          </button>
          <p style={{textAlign:"center",fontSize:".76rem",color:"var(--text3)",marginTop:14}}>
            Demo: <b>admin@test.com</b> / admin123 &nbsp;or&nbsp; <b>jane@test.com</b> / jane123
          </p>
        </div>
      </div>
    </div>
  );
}

/* ── Expense Modal ── */
function ExpenseModal({ expense, onSave, onClose }) {
  const editing = Boolean(expense?.id);
  const [form, setForm] = useState({
    title:expense?.title||"", category:expense?.category||CATS[0],
    amount:expense?.amount||"", date:expense?.date?.split("T")[0]||todayStr(), description:expense?.description||""
  });
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const ch = e => { setForm({...form,[e.target.name]:e.target.value}); setErr(""); };

  async function submit() {
    if (!form.title.trim()) return setErr("Give it a title.");
    if (!form.amount||Number(form.amount)<=0) return setErr("Amount should be more than zero.");
    if (!form.date) return setErr("Pick a date.");
    setBusy(true);
    try {
      const body = JSON.stringify({ ...form, amount:Number(form.amount) });
      if (editing) await api(`/api/expenses/${expense.id}`, { method:"PUT", body });
      else await api("/api/expenses", { method:"POST", body });
      onSave(editing?"Updated!":"Added!");
    } catch(e) { setErr(e.message); }
    finally { setBusy(false); }
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>{editing?"Edit expense":"Add an expense"}</h3><button className="close-btn" onClick={onClose}>&times;</button></div>
        <div className="modal-body">
          {err && <div className="form-error">{err}</div>}
          <div className="form-group"><label className="form-label">What was it for?</label><input className="input" name="title" value={form.title} onChange={ch} placeholder="e.g. Coffee run" autoFocus /></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Category</label><select className="input" name="category" value={form.category} onChange={ch}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="form-group"><label className="form-label">How much?</label><input className="input" name="amount" type="number" step=".01" min=".01" value={form.amount} onChange={ch} placeholder="0.00" /></div>
          </div>
          <div className="form-group"><label className="form-label">When?</label><input className="input" name="date" type="date" value={form.date} onChange={ch} /></div>
          <div className="form-group"><label className="form-label">Notes (optional)</label><textarea className="input" name="description" value={form.description} onChange={ch} placeholder="Any details..." /></div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={busy}>{busy?"Saving...":editing?"Save changes":"Add it"}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Edit User Modal ── */
function EditUserModal({ user, onSave, onClose }) {
  const [form, setForm] = useState({ name:user.name, email:user.email, role:user.role });
  const ch = e => setForm({...form,[e.target.name]:e.target.value});
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h3>Edit user</h3><button className="close-btn" onClick={onClose}>&times;</button></div>
        <div className="modal-body">
          <div className="form-group"><label className="form-label">Name</label><input className="input" name="name" value={form.name} onChange={ch}/></div>
          <div className="form-group"><label className="form-label">Email</label><input className="input" name="email" value={form.email} onChange={ch}/></div>
          <div className="form-group"><label className="form-label">Role</label><select className="input" name="role" value={form.role} onChange={ch}><option value="user">User</option><option value="admin">Admin</option></select></div>
        </div>
        <div className="modal-foot"><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={()=>onSave(form)}>Save changes</button></div>
      </div>
    </div>
  );
}

/* ── Confirm ── */
function Confirm({ msg, onYes, onNo }) {
  return (
    <div className="overlay" onClick={onNo}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="confirm-body"><h3>Are you sure?</h3><p>{msg}</p></div>
        <div className="confirm-foot"><button className="btn btn-ghost" onClick={onNo}>Cancel</button><button className="btn btn-danger" onClick={onYes}>Yes, delete</button></div>
      </div>
    </div>
  );
}

/* ══════════════ APP ══════════════ */
function App() {
  const [me, setMe] = useState(null);
  const [token, setToken] = useState(sessionStorage.getItem("token"));
  const [page, setPage] = useState("expenses");
  const [expenses, setExpenses] = useState([]);
  const [summary, setSummary] = useState(null);
  const [adminUsers, setAdminUsers] = useState([]);
  const [activities, setActivities] = useState([]);
  const [loading, setLoading] = useState(false);
  const [catFilter, setCatFilter] = useState("");
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [editUser, setEditUser] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [toast, setToast] = useState("");
  const [adminTab, setAdminTab] = useState("users");

  const flash = m => { setToast(m); setTimeout(()=>setToast(""),2200); };

  /* ── auth ── */
  function handleLogin(tok, user) {
    sessionStorage.setItem("token", tok);
    setToken(tok); setMe(user);
    flash("Hey, "+user.name.split(" ")[0]+"!");
  }
  function logout() {
    sessionStorage.removeItem("token");
    setToken(null); setMe(null); setPage("expenses");
  }

  // Check token on mount
  useEffect(() => {
    if (!token) return;
    api("/api/auth/me").then(u => setMe(u)).catch(() => { sessionStorage.removeItem("token"); setToken(null); });
  }, [token]);

  /* ── data loading ── */
  const loadExpenses = useCallback(async () => {
    setLoading(true);
    try {
      const url = catFilter ? "/api/expenses?category=" + encodeURIComponent(catFilter) : "/api/expenses";
      setExpenses(await api(url));
    } catch { flash("Couldn't load expenses"); }
    finally { setLoading(false); }
  }, [catFilter]);

  const loadSummary = useCallback(async () => {
    setLoading(true);
    try { setSummary(await api("/api/expenses/summary")); }
    catch { flash("Couldn't load summary"); }
    finally { setLoading(false); }
  }, []);

  const loadAdmin = useCallback(async () => {
    setLoading(true);
    try {
      const [u, a] = await Promise.all([api("/api/admin/users"), api("/api/admin/activities")]);
      setAdminUsers(u); setActivities(a);
    } catch { flash("Couldn't load admin data"); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => {
    if (!me) return;
    if (page==="expenses") loadExpenses();
    else if (page==="dashboard") loadSummary();
    else if (page==="admin") loadAdmin();
  }, [me, page, loadExpenses, loadSummary, loadAdmin]);

  /* ── handlers ── */
  function afterExpenseSave(msg) { setModal(null); flash(msg); loadExpenses(); if(page==="dashboard") loadSummary(); }

  async function deleteExpense() {
    try {
      await api(`/api/expenses/${confirm.id}`, { method:"DELETE" });
      setConfirm(null); flash("Deleted"); loadExpenses();
    } catch { flash("Delete failed"); }
  }

  async function saveAdminUser(data) {
    try {
      await api(`/api/admin/users/${editUser.id}`, { method:"PUT", body:JSON.stringify(data) });
      setEditUser(null); flash("User updated"); loadAdmin();
    } catch(e) { flash(e.message); }
  }

  async function deleteAdminUser() {
    try {
      await api(`/api/admin/users/${confirm.id}`, { method:"DELETE" });
      setConfirm(null); flash("User deleted"); loadAdmin();
    } catch(e) { flash(e.message); }
  }

  /* ── derived ── */
  const total = expenses.reduce((s,e)=>s+e.amount,0);
  const avg = expenses.length ? total/expenses.length : 0;
  const cats = new Set(expenses.map(e=>e.category)).size;

  // Client-side live search for instant filtering
  const filtered = expenses.filter(e => {
    if (!search) return true;
    const q = search.toLowerCase();
    return e.title.toLowerCase().includes(q) || (e.description||"").toLowerCase().includes(q) || e.category.toLowerCase().includes(q);
  });

  /* ── render ── */
  if (!me) return <AuthPage onLogin={handleLogin} />;

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      {/* HEADER */}
      <header className="header">
        <div className="logo"><span className="logo-dot"></span> SpendWise</div>
        <nav className="nav">
          <button className={"nav-btn"+(page==="expenses"?" active":"")} onClick={()=>setPage("expenses")}>&#128203; Expenses</button>
          <button className={"nav-btn"+(page==="dashboard"?" active":"")} onClick={()=>setPage("dashboard")}>&#128202; Dashboard</button>
          {me.role==="admin" && <button className={"nav-btn"+(page==="admin"?" active":"")} onClick={()=>setPage("admin")}>&#128737; Admin</button>}
        </nav>
        <div className="user-info">
          <span>{me.name} {me.role==="admin" && <span className="badge" style={{color:"var(--accent)"}}>admin</span>}</span>
          <button onClick={logout} title="Sign out">{"\u2190"}</button>
        </div>
      </header>

      <div className="container">
        {/* STATS */}
        <div className="stats-row">
          <div className="card"><div className="stat-label">Total spent</div><div className="stat-value mono">{fmt(total)}</div><div className="stat-sub">{expenses.length} expense{expenses.length!==1&&"s"}</div></div>
          <div className="card"><div className="stat-label">Average</div><div className="stat-value mono">{fmt(avg)}</div><div className="stat-sub">per expense</div></div>
          <div className="card"><div className="stat-label">Categories</div><div className="stat-value mono">{cats}</div><div className="stat-sub">in use</div></div>
        </div>

        {/* ── EXPENSES ── */}
        {page==="expenses" && (
          <>
            <div className="toolbar">
              <div className="toolbar-left">
                <select className="input" value={catFilter} onChange={e=>{setCatFilter(e.target.value)}}>
                  <option value="">All categories</option>
                  {CATS.map(c=><option key={c}>{c}</option>)}
                </select>
                <div className="search-wrap">
                  <span className="search-icon">&#128269;</span>
                  <input className="input" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} />
                </div>
              </div>
              <button className="btn btn-primary" onClick={()=>setModal({})}>+ New expense</button>
            </div>

            {loading ? <div className="spinner"></div> : (
              <div className="table">
                <div className="table-head cols-5"><span>Expense</span><span>Category</span><span>Amount</span><span>Date</span><span></span></div>
                {filtered.length===0 ? <div className="empty">No expenses found.</div> :
                  filtered.map(exp => (
                    <div className="table-row cols-5" key={exp.id}>
                      <div><div className="exp-title">{exp.title}</div>{exp.description && <div className="exp-desc">{exp.description}</div>}</div>
                      <div><span className="badge" style={{color:CAT_CLR[exp.category]}}>{exp.category}</span></div>
                      <div className="mono" style={{fontWeight:500,fontSize:".9rem"}}>{fmt(exp.amount)}</div>
                      <div className="muted">{fmtDate(exp.date)}</div>
                      <div className="row-actions">
                        <button className="icon-btn" onClick={()=>setModal(exp)} title="Edit">&#9998;</button>
                        <button className="icon-btn del" onClick={()=>setConfirm({...exp,type:"expense"})} title="Delete">&#215;</button>
                      </div>
                    </div>
                  ))
                }
              </div>
            )}
          </>
        )}

        {/* ── DASHBOARD ── */}
        {page==="dashboard" && (
          loading ? <div className="spinner"></div> : summary && (
            <div className="dash-grid">
              <div className="card chart-card">
                <h3>By category</h3>
                {summary.byCategory.length===0 ? <p className="muted">No data yet.</p> : (() => {
                  const max = Math.max(...summary.byCategory.map(c=>c.value),1);
                  return summary.byCategory.map(cat => (
                    <div className="cat-row" key={cat.name}>
                      <span className="cat-name">{cat.name}</span>
                      <div className="cat-bar-wrap"><div className="cat-bar" style={{width:`${(cat.value/max)*100}%`,background:CAT_CLR[cat.name]||"#b5ada3"}}></div></div>
                      <span className="cat-amount">{fmt(cat.value)}</span>
                    </div>
                  ));
                })()}
              </div>
              <div className="card chart-card">
                <h3>Monthly trend</h3>
                {summary.monthly.length===0 ? <p className="muted">No data yet.</p> : (() => {
                  const max = Math.max(...summary.monthly.map(m=>m.amount),1);
                  return (
                    <div className="bar-chart">
                      {summary.monthly.map((m,i) => (
                        <div className="bar-col" key={i}>
                          <span className="bar-val">{fmt(m.amount)}</span>
                          <div className="bar" style={{height:`${(m.amount/max)*130}px`}}></div>
                          <span className="bar-lbl">{MONTHS[parseInt(m.name)-1]}</span>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
            </div>
          )
        )}

        {/* ── ADMIN ── */}
        {page==="admin" && me.role==="admin" && (
          loading ? <div className="spinner"></div> : (
            <>
              <div className="tab-bar">
                <button className={"tab-btn"+(adminTab==="users"?" active":"")} onClick={()=>setAdminTab("users")}>&#128101; Users</button>
                <button className={"tab-btn"+(adminTab==="activity"?" active":"")} onClick={()=>setAdminTab("activity")}>&#128196; Activity Log</button>
              </div>

              {adminTab==="users" && (
                <div className="table">
                  <div className="table-head cols-admin"><span>Name</span><span>Email</span><span>Role</span><span>Joined</span><span></span></div>
                  {adminUsers.map(u => (
                    <div className="table-row cols-admin" key={u.id}>
                      <div style={{fontWeight:600,fontSize:".88rem"}}>{u.name}</div>
                      <div className="muted">{u.email}</div>
                      <div><span className="badge" style={{color:u.role==="admin"?"var(--accent)":"var(--blue)"}}>{u.role}</span></div>
                      <div className="muted">{fmtDate(u.created_at)}</div>
                      <div className="row-actions">
                        <button className="icon-btn" onClick={()=>setEditUser(u)} title="Edit">&#9998;</button>
                        {u.id!==me.id && <button className="icon-btn del" onClick={()=>setConfirm({...u,type:"user"})} title="Delete">&#215;</button>}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {adminTab==="activity" && (
                <div className="table">
                  <div className="table-head cols-activity"><span>User</span><span>Action</span><span>Details</span><span>Time</span></div>
                  {activities.length===0 ? <div className="empty">No activity yet.</div> :
                    activities.map(a => (
                      <div className="table-row cols-activity" key={a.id}>
                        <div style={{fontWeight:600,fontSize:".84rem"}}>{a.user_name||"Deleted"}</div>
                        <div><span className="badge" style={{color:a.action.includes("delete")?"var(--red)":a.action.includes("login")||a.action.includes("register")?"var(--green)":"var(--blue)"}}>{a.action.replace(/_/g," ")}</span></div>
                        <div className="muted">{a.details}</div>
                        <div className="muted-sm">{fmtTime(a.created_at)}</div>
                      </div>
                    ))
                  }
                </div>
              )}
            </>
          )
        )}
      </div>

      {/* MODALS */}
      {modal!==null && <ExpenseModal expense={modal} onSave={afterExpenseSave} onClose={()=>setModal(null)} />}
      {editUser && <EditUserModal user={editUser} onSave={saveAdminUser} onClose={()=>setEditUser(null)} />}
      {confirm && <Confirm
        msg={confirm.type==="user" ? `This will delete "${confirm.name}" and all their data.` : `"${confirm.title}" will be gone for good.`}
        onYes={confirm.type==="user" ? deleteAdminUser : deleteExpense}
        onNo={()=>setConfirm(null)}
      />}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
